{% extends "chat/base.html" %}
{% load i18n %}

{% block title %}{% trans "My Profile" %} — ChatIA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="mb-4">{% trans "My Profile" %}</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{% trans "Alias" %}</label>
                        <input type="text" name="alias" class="form-control" value="{{ perfil.alias }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{% trans "Model" %}</label>
                        <input type="text" name="modelo" class="form-control" value="{{ perfil.modelo }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{% trans "Temperature (0.0 - 1.0)" %}</label>
                        <p>EBUG {{ perfil.temperatura }}</p>
                        <input type="number" name="temperatura" class="form-control"
                               step="any" min="0" max="1" value="{{ perfil.temperatura }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">{% trans "Save changes" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
